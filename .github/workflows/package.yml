name: Package Addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run GdUnit4 tests
        uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: 4.7
          godot-status: stable
          version: installed
          publish-report: false
          paths: res://tests
          timeout: 5

      - name: Validate release version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          ADDON_VERSION="$(sed -n 's/^version="\([^"]*\)"$/\1/p' addons/gdsql/plugin.cfg)"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH; received: $TAG"
            exit 1
          fi

          if [ -z "$ADDON_VERSION" ]; then
            echo "Could not read one version from addons/gdsql/plugin.cfg"
            exit 1
          fi

          if [ "$TAG" != "v$ADDON_VERSION" ]; then
            echo "Release tag $TAG does not match plugin.cfg version v$ADDON_VERSION"
            exit 1
          fi

          echo "Release version $ADDON_VERSION is consistent."

      - name: Package addon
        run: |
          mkdir -p dist/addons
          cp -r addons/gdsql dist/addons/gdsql
          cd dist
          zip -r ../gdsql-${{ github.ref_name }}.zip addons/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: gdsql-${{ github.ref_name }}.zip
