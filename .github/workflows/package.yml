name: Package Addon

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update file manifest
        run: |
          MANIFEST="addons/gdsql/tabs/plugin_updater/file_manifest.txt"
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"

          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            echo "Diffing $PREV_TAG → $TAG"

            grep -v "^[+-],$VER," "$MANIFEST" > "${MANIFEST}.tmp" && mv "${MANIFEST}.tmp" "$MANIFEST"

            while IFS= read -r f; do
              f="${f//\"}"
              [ -n "$f" ] && echo "+,$VER,$f" >> "$MANIFEST"
            done < <(git diff --name-only --diff-filter=A "$PREV_TAG"...HEAD -- addons/gdsql/ | grep -v '\.translation$')
            while IFS= read -r f; do
              f="${f//\"}"
              [ -n "$f" ] && echo "-,$VER,$f" >> "$MANIFEST"
            done < <(git diff --name-only --diff-filter=D "$PREV_TAG"...HEAD -- addons/gdsql/ | grep -v '\.translation$')
          else
            echo "No previous tag. Creating initial manifest."
            find addons/gdsql/ -type f \
              ! -name '*.translation' \
              | sort \
              | sed "s|^|+,$VER,|" > "$MANIFEST"
          fi

      - name: Build release body
        run: |
          RANGES=$(cat addons/gdsql/upgrade_ranges.txt 2>/dev/null || echo "")
          echo "upgrade_ranges: $RANGES" > release_body.txt
          echo "" >> release_body.txt

      - name: Package addon
        run: |
          mkdir -p dist/addons
          cp -r addons/gdsql dist/addons/gdsql
          cd dist
          zip -r ../gdsql-${{ github.ref_name }}.zip addons/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.txt
          generate_release_notes: true
          files: gdsql-${{ github.ref_name }}.zip
