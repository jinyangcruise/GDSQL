name: Package Addon

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update file manifest
        run: |
          MANIFEST="addons/gdsql/tabs/plugin_updater/file_manifest.txt"
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"

          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            echo "Diffing $PREV_TAG → $TAG"

            # Remove any previous entries for this tag (in case workflow runs twice)
            grep -v "^[+-],$VER," "$MANIFEST" > "${MANIFEST}.tmp" && mv "${MANIFEST}.tmp" "$MANIFEST"

            # New files
            while IFS= read -r f; do
              [ -n "$f" ] && echo "+,$VER,$f" >> "$MANIFEST"
            done < <(git diff --name-only --diff-filter=A "$PREV_TAG"...HEAD -- addons/gdsql/)
            # Removed files
            while IFS= read -r f; do
              [ -n "$f" ] && echo "-,$VER,$f" >> "$MANIFEST"
            done < <(git diff --name-only --diff-filter=D "$PREV_TAG"...HEAD -- addons/gdsql/)
          else
            echo "No previous tag. Creating initial manifest."
            find addons/gdsql/ -type f \
              ! -name '*.import' \
              ! -name '*.translation' \
              | sort \
              | sed "s|^|+,$VER,|" > "$MANIFEST"
          fi

      - name: Package addon
        run: |
          mkdir -p dist/addons
          cp -r addons/gdsql dist/addons/gdsql
          cd dist
          zip -r ../gdsql-${{ github.ref_name }}.zip addons/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: gdsql-${{ github.ref_name }}.zip
